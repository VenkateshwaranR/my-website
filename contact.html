<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact VNX Digital - Start Your Campaign">
    <title>Contact | VNX Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="dark-theme">
    <div class="interactive-bg">
        <div class="blob"></div>
    </div>
    <div class="glass-overlay"></div>
    <div class="custom-cursor"></div>

    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">VNX<span>.</span></a>
            <nav class="nav-links">
                <a href="services.html">Services</a>
                <a href="work.html">Our Work</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="btn btn-outline">Let's Talk</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Simplified Clean Contact Section -->
        <section class="contact" style="padding-top: 12rem; padding-bottom: 8rem;" id="contact">
            <div class="contact-wrapper animate-on-scroll fade-up">
                <div class="contact-info">
                    <h2>Ready to launch?</h2>
                    <p>Drop us a message. Let's build something exceptional together.</p>
                    
                    <div class="contact-details">
                        <div class="detail-item">
                            <i class="ph ph-envelope"></i>
                            <span>venran245@gmail.com</span>
                        </div>
                        <div class="detail-item">
                            <i class="ph ph-map-pin"></i>
                            <span>gummidipoondi</span>
                        </div>
                    </div>
                </div>
                
                <form class="contact-form">
                    <div class="form-group">
                        <input type="text" id="name" placeholder=" " required>
                        <label for="name">Your Name</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label for="email">Email Address</label>
                    </div>
                    <div class="form-group">
                        <textarea id="message" rows="4" placeholder=" " required></textarea>
                        <label for="message">Project Details</label>
                    </div>
                    <button type="submit" class="btn btn-primary submit-btn">
                        Send Request <i class="ph ph-paper-plane-right"></i>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">VNX<span>.</span></div>
            <div class="footer-links">
                <a href="services.html">Services</a>
                <a href="work.html">Work</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="footer-social">
                <a href="#"><i class="ph ph-twitter-logo"></i></a>
                <a href="#"><i class="ph ph-instagram-logo"></i></a>
                <a href="#"><i class="ph ph-linkedin-logo"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 VNX Digital. All rights reserved.</p>
        </div>
    </footer>

    <!-- Lenis High-Fidelity Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
